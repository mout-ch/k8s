---
# VaultSecret for Firefly Data Importer
# Store the secrets in Vault at path: apps/firefly/data-importer
# Keys needed:
#   - token: Personal Access Token from Firefly III (Profile > OAuth > Personal Access Tokens)
#   - auto-import-secret: Random secret generated with: openssl rand -base64 32
apiVersion: ricoberger.de/v1alpha1
kind: VaultSecret
metadata:
  name: firefly-data-importer-token
spec:
  path: apps/firefly/data-importer
  type: Opaque
  keys:
    - token
    - auto-import-secret
  templates:
    accessToken: "{% .Secrets.token %}"
    auto-import-secret: '{% index .Secrets "auto-import-secret" %}'
