---
# Traefik ForwardAuth Middleware for Authentik
# This middleware will require authentication through Authentik before accessing the Firefly Importer
apiVersion: traefik.containo.us/v1alpha1
kind: Middleware
metadata:
  name: firefly-importer-auth
spec:
  forwardAuth:
    address: http://authentik-server.goauthentik.svc.cluster.local/outpost.goauthentik.io/auth/traefik
    trustForwardHeader: true
    authResponseHeaders:
      - X-authentik-username
      - X-authentik-groups
      - X-authentik-email
      - X-authentik-name
      - X-authentik-uid
      - X-authentik-jwt
      - X-authentik-meta-jwks
      - X-authentik-meta-outpost
      - X-authentik-meta-provider
      - X-authentik-meta-app
      - X-authentik-meta-version
