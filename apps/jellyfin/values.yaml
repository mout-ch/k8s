---
jellyfin:
  image:
    tag: 10.11.8
  
  # Run as non-root user for security
  podSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    runAsNonRoot: true
  
  securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL
  
  # Resource limits for Jellyfin media server
  # Transcoding can be CPU-intensive, adjust based on your workload
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 4000m
      memory: 4Gi
  
  service:
    type: NodePort
    port: 8096
    nodePort: 30010

  ingress:
    enabled: true
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      kubernetes.io/ingress.class: traefik
      traefik.ingress.kubernetes.io/router.middlewares: kube-system-redirect-https@kubernetescrd,jellyfin-jellyfin-buffering@kubernetescrd
      traefik.ingress.kubernetes.io/frontend-entry-points: http,https
      traefik.ingress.kubernetes.io/redirect-entry-point: https
      traefik.ingress.kubernetes.io/redirect-permanent: "true"
    path: /
    hosts:
      - jellyfin.theater.kelbert.fr
    tls:
      - secretName: jellyfin-theater-kelbert-fr-tls
        hosts:
          - jellyfin.theater.kelbert.fr

  persistence:
    config:
      enabled: true
      storageClass: local-path
      accessMode: ReadWriteOnce
      size: 1Gi

    media:
      enabled: true
      existingClaim: media
      storageClass: jellyfin-media
